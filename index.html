<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Minimal PWA</title>

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#0d6efd" />

    <style>
      body {
        font-family: system-ui, Arial;
        margin: 2rem;
      }

      .card {
        border: 1px solid #ddd;
        padding: 1rem;
        border-radius: 12px;
        max-width: 520px;
      }

      button {
        padding: 0.6rem 1rem;
        border-radius: 10px;
        border: 1px solid #ccc;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Minimal PWA</h1>
      <p id="status">Checking service worker...</p>
      <button id="ping">Ping</button>
      <p id="out"></p>
    </div>

    <!-- prettier-ignore -->
    <script>
      const statusEl = document.getElementById("status");
      const outEl = document.getElementById("out");

      document.getElementById("ping").addEventListener("click", () =>
      {
        outEl.textContent = "Pong @ " + new Date().toLocaleTimeString();
      });

      if ("serviceWorker" in navigator)
      {
        window.addEventListener("load", async () =>
        {
          try
          {
            const reg = await navigator.serviceWorker.register("./sw.js");
            statusEl.textContent = "Service worker registered: " + reg.scope;
          }
          catch (e)
          {
            statusEl.textContent = "SW registration failed: " + e;
          }
        });
      }
      else
      {
        statusEl.textContent = "Service workers not supported in this browser.";
      }
    </script>
  </body>
</html>
